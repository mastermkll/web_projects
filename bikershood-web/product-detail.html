<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bikershood | Product Detail</title>
    <meta
      name="description"
      content="Detailed motorcycle accessory page with gallery, compatibility, and instant add to cart."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="products">
    <div id="site-header"></div>

    <main class="page-wrap">
      <section class="section">
        <div class="container detail-layout">
          <section>
            <div class="gallery-main" id="detailMainImage"></div>
            <div class="thumb-row" id="detailThumbs"></div>
          </section>

          <section class="detail-card">
            <p class="detail-brand" id="detailBrand">Brand</p>
            <h1 class="detail-title" id="detailTitle">Product Title</h1>
            <p class="detail-description" id="detailDescription"></p>

            <ul class="detail-list" id="featureList"></ul>

            <p id="detailCompatibleText" class="compatibility"></p>
            <div class="compat-list" id="compatList"></div>

            <p class="detail-price" id="detailPrice">INR 0</p>

            <div class="action-row">
              <button id="addDetailCart" class="btn btn-primary" type="button">Add to Cart</button>
              <a id="detailWhatsapp" class="btn btn-whatsapp" target="_blank" rel="noopener">Order on WhatsApp</a>
            </div>

            <div class="info-box">
              <p>Installation support included. Dispatch in 24-48 hours.</p>
            </div>
          </section>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="section-head">
            <div>
              <p class="eyebrow">You May Also Like</p>
              <h2 class="section-title">Matching Picks</h2>
            </div>
            <a href="products.html" class="btn btn-outline">Back to Catalog</a>
          </div>
          <div class="card-grid" id="relatedGrid"></div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product-detail.js"></script>
  </body>
</html>
